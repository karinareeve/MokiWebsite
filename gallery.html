<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moki Gallery</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <nav class="navbar">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Moki</a></li>
                <li><a href="tricks.html">Tricks</a></li>
                <li><a href="gallery.html">Gallery</a></li>
            </ul>
        </nav>

    </header>

    <main>

        <section class="gallery">

            <h1>Moki's Gallery</h1>

            <div class="gallery-grid">

                <div class="photo-card">
                    <img src="images/baby.jpg" alt="Moki cuddle">
                    <p>Cuddle time</p>
                </div>

                <div class="photo-card">
                    <img src="images/with dad.png" alt="Moki with dad">
                    <p>Moki with dad</p>
                </div>

                <div class="photo-card">
                    <img src="images/hiking family.jpg" alt="Moki hiking">
                    <p>I love hiking</p>
                </div>

                <div class="photo-card">
                    <img src="images/shake.png" alt="Moki training">
                    <p>Training Time</p>
                </div>

                <div class="photo-card">
                    <img src="images/july.png" alt="july">
                    <p>My first 4 of july</p>
                </div>

                <div class="photo-card">
                    <img src="images/fresh cut.jpg" alt="Moki bath">
                    <p>Fresh cut</p>
                </div>

                <div class="photo-card">
                    <img src="images/baby 2.jpg" alt="Moki baby2">
                    <p>Another baby picture</p>
                </div>

                <div class="photo-card">
                    <img src="images/withmom.png" alt="Moki mom">
                    <p>Moki with mom</p>
                </div>

                <div class="photo-card">
                    <img src="images/family.jpg" alt="family">
                    <p>Family time</p>
                </div>

                <div class="photo-card">
                    <img src="images/sleeping.jpg" alt="sleeping">
                    <p>Taking a nap</p>
                </div>


            </div>

        </section>

    </main>

    <footer>

        <p>Made with love by Karina</p>

    </footer>

</body>

</html>
